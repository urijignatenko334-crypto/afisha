<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Афиша Эфира</title>
    <style>
        /* Убираем всё лишнее, чтобы фон был идеально черным */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Настройки самой картинки */
        img { 
            max-width: 100%; 
            max-height: 100vh; 
            object-fit: contain; /* Картинка не растягивается, а вписывается */
            display: block;
            /* Добавим мягкое свечение, чтобы афиша «ожила» на черном фоне */
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body>

    <img src="https://vmfile.com/upload/838/1415274579.jpg" alt="Рекламная Афиша">

</body>
</html>
